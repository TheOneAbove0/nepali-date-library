<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nepali Date Library Vanilla JS Example</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 40px;
      }
      .picker-container {
        max-width: 400px;
        margin-bottom: 20px;
      }
      .selected-value {
        margin-top: 10px;
        font-weight: bold;
        color: #2c3e50;
      }

      /* Example basic styles for the vanilla picker */
      .npdl-picker {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 12px;
        width: 300px;
        background: #fff;
      }
      .npdl-picker__header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .npdl-picker__grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
        text-align: center;
      }
      .npdl-picker__weekday {
        font-weight: 600;
        color: #666;
        font-size: 12px;
        padding-bottom: 8px;
      }
      .npdl-picker__day {
        background: none;
        border: 1px solid transparent;
        padding: 6px 0;
        border-radius: 4px;
        cursor: pointer;
      }
      .npdl-picker__day:hover:not(:disabled) {
        background: #f0f0f0;
      }
      .npdl-picker__day--selected {
        background: #228be6;
        color: white;
        font-weight: bold;
      }
      .npdl-picker__day--selected:hover:not(:disabled) {
        background: #1c7ed6;
      }
      .npdl-picker__day--muted {
        color: #ccc;
      }
      .npdl-picker__day:disabled {
        color: #eee;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>Vanilla JS Date Picker</h1>

    <div class="picker-container">
      <div id="my-picker"></div>
      <div class="selected-value">Selected: <span id="selected-date">None</span></div>
    </div>

</html>
